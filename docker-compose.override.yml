services:
  traefik:
    image: traefik:latest
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    ports:
      - "${DOCKER_HTTP_PORT:-80}:80"
      - "${DOCKER_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      webguard-network:
        aliases:
          - "${DOCKER_APP_HOST:-webguard.test}"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${DOCKER_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${DOCKER_MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - webguard-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.mailpit.rule=Host(`${DOCKER_MAILPIT_HOST:-mailpit.webguard.test}`)
      - traefik.http.routers.mailpit.entrypoints=web
      - traefik.http.services.mailpit.loadbalancer.server.port=8025
      - traefik.http.routers.mailpit-secure.rule=Host(`${DOCKER_MAILPIT_HOST:-mailpit.webguard.test}`)
      - traefik.http.routers.mailpit-secure.entrypoints=websecure
      - traefik.http.routers.mailpit-secure.tls=true

  php:
    build:
      context: .
      target: development
      args:
        - USER_ID=${USER_ID:-1000}
        - GROUP_ID=${GROUP_ID:-1000}
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      APP_URL: "http://${DOCKER_APP_HOST:-webguard.test}"
      DB_CONNECTION: "mysql"
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_DATABASE: "webguard_core"
      DB_USERNAME: "webguard"
      DB_PASSWORD: "webguard"
      CACHE_STORE: "redis"
      QUEUE_CONNECTION: "redis"
      REDIS_CLIENT: "phpredis"
      REDIS_HOST: "redis"
      REDIS_PASSWORD: "null"
      REDIS_PORT: "6379"
      MAIL_MAILER: "smtp"
      MAIL_HOST: "mailpit"
      MAIL_PORT: "1025"
      MAIL_USERNAME: "null"
      MAIL_PASSWORD: "null"
      MAIL_ENCRYPTION: "null"
      AUTORUN_DEBUG: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.webguard.rule=Host(`${DOCKER_APP_HOST:-webguard.test}`)
      - traefik.http.routers.webguard.entrypoints=web
      - traefik.http.services.webguard.loadbalancer.server.port=${DOCKER_PHP_INTERNAL_PORT:-8080}
      - traefik.http.routers.webguard-secure.rule=Host(`${DOCKER_APP_HOST:-webguard.test}`)
      - traefik.http.routers.webguard-secure.entrypoints=websecure
      - traefik.http.routers.webguard-secure.tls=true

  schedule:
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      APP_URL: "http://${DOCKER_APP_HOST:-webguard.test}"
      DB_CONNECTION: "mysql"
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_DATABASE: "webguard_core"
      DB_USERNAME: "webguard"
      DB_PASSWORD: "webguard"
      CACHE_STORE: "redis"
      QUEUE_CONNECTION: "redis"
      REDIS_CLIENT: "phpredis"
      REDIS_HOST: "redis"
      REDIS_PASSWORD: "null"
      REDIS_PORT: "6379"
      MAIL_MAILER: "smtp"
      MAIL_HOST: "mailpit"
      MAIL_PORT: "1025"
      MAIL_USERNAME: "null"
      MAIL_PASSWORD: "null"
      MAIL_ENCRYPTION: "null"

  queue-default:
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      APP_URL: "http://${DOCKER_APP_HOST:-webguard.test}"
      DB_CONNECTION: "mysql"
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_DATABASE: "webguard_core"
      DB_USERNAME: "webguard"
      DB_PASSWORD: "webguard"
      CACHE_STORE: "redis"
      QUEUE_CONNECTION: "redis"
      REDIS_CLIENT: "phpredis"
      REDIS_HOST: "redis"
      REDIS_PASSWORD: "null"
      REDIS_PORT: "6379"
      MAIL_MAILER: "smtp"
      MAIL_HOST: "mailpit"
      MAIL_PORT: "1025"
      MAIL_USERNAME: "null"
      MAIL_PASSWORD: "null"
      MAIL_ENCRYPTION: "null"

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "${DOCKER_VITE_PORT:-5173}"]
    environment:
      APP_URL: "http://${DOCKER_APP_HOST:-webguard.test}"
      VITE_DEV_SERVER_URL: "http://${DOCKER_APP_HOST:-webguard.test}:${DOCKER_VITE_PORT:-5173}"
      VITE_HMR_HOST: "${DOCKER_APP_HOST:-webguard.test}"
      VITE_USE_POLLING: "true"
      VITE_POLLING_INTERVAL: "300"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${DOCKER_VITE_PORT:-5173}:${DOCKER_VITE_PORT:-5173}"
    volumes:
      - ./:/var/www/html
      - webguard_node_modules:/var/www/html/node_modules
    networks:
      - webguard-network

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "webguard_core"
      MYSQL_USER: "webguard"
      MYSQL_PASSWORD: "webguard"
    ports:
      - "${DOCKER_MYSQL_PORT:-3306}:3306"

volumes:
  webguard_node_modules:
    driver: local
