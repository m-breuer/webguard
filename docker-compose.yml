services:
  traefik:
    image: traefik:${DOCKER_TRAEFIK_VERSION:-v3.6.6}
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:${DOCKER_TRAEFIK_WEB_PORT:-80}
      - --entrypoints.websecure.address=:${DOCKER_TRAEFIK_WEBSECURE_PORT:-443}
    ports:
      - "${DOCKER_HTTP_PORT:-80}:${DOCKER_TRAEFIK_WEB_PORT:-80}"
      - "${DOCKER_HTTPS_PORT:-443}:${DOCKER_TRAEFIK_WEBSECURE_PORT:-443}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - webguard-network

  php:
    build:
      context: .
      target: ${DOCKER_PHP_TARGET:-production}
    image: ${DOCKER_PHP_IMAGE:-webguard-core-php:local}
    environment:
      SSL_MODE: "${DOCKER_SSL_MODE:-off}"
      PHP_MEMORY_LIMIT: "${DOCKER_PHP_MEMORY_LIMIT:-512M}"
      PHP_UPLOAD_MAX_FILE_SIZE: "${DOCKER_PHP_UPLOAD_MAX_FILE_SIZE:-100M}"
      PHP_MAX_EXECUTION_TIME: "${DOCKER_PHP_MAX_EXECUTION_TIME:-300}"
      PHP_OPCACHE_ENABLE: "1"
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATE: "true"
      AUTORUN_LARAVEL_MIGRATION_FORCE: "true"
      AUTORUN_LARAVEL_OPTIMIZE: "true"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
    volumes:
      - config:/config
      - data:/data
    env_file:
      - .env
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.webguard.rule=Host(`${DOCKER_APP_HOST:-webguard.localhost}`)
      - traefik.http.routers.webguard.entrypoints=web
      - traefik.http.services.webguard.loadbalancer.server.port=${DOCKER_PHP_INTERNAL_PORT:-8080}
      - traefik.http.routers.webguard-secure.rule=Host(`${DOCKER_APP_HOST:-webguard.localhost}`)
      - traefik.http.routers.webguard-secure.entrypoints=websecure
      - traefik.http.routers.webguard-secure.tls=true
    networks:
      webguard-network:
        aliases:
          - webguard-core
          - webguard-api

  schedule:
    build:
      context: .
      target: ${DOCKER_WORKER_TARGET:-worker}
    environment:
      PHP_MEMORY_LIMIT: "${DOCKER_WORKER_MEMORY_LIMIT:-2048M}"
      PHP_UPLOAD_MAX_FILE_SIZE: "${DOCKER_WORKER_UPLOAD_MAX_FILE_SIZE:-100M}"
      PHP_MAX_EXECUTION_TIME: "${DOCKER_WORKER_MAX_EXECUTION_TIME:-3600}"
      PHP_OPCACHE_ENABLE: "1"
      AUTORUN_ENABLED: "false"
    command: php artisan schedule:work --verbose --no-interaction
    stop_signal: SIGTERM
    env_file:
      - .env
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck-schedule"]
      start_period: 10s
    networks:
      - webguard-network

  queue-default:
    build:
      context: .
      target: ${DOCKER_WORKER_TARGET:-worker}
    environment:
      PHP_MEMORY_LIMIT: "${DOCKER_WORKER_MEMORY_LIMIT:-2048M}"
      PHP_UPLOAD_MAX_FILE_SIZE: "${DOCKER_WORKER_UPLOAD_MAX_FILE_SIZE:-100M}"
      PHP_MAX_EXECUTION_TIME: "${DOCKER_WORKER_MAX_EXECUTION_TIME:-3600}"
      PHP_OPCACHE_ENABLE: "1"
      AUTORUN_ENABLED: "false"
    command: php artisan queue:work redis --queue=${DOCKER_QUEUE_NAME:-default} --sleep=${DOCKER_QUEUE_SLEEP:-1} --tries=${DOCKER_QUEUE_TRIES:-1} --max-time=${DOCKER_QUEUE_MAX_TIME:-3600}
    stop_signal: SIGTERM
    env_file:
      - .env
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck-queue"]
      start_period: 10s
    networks:
      - webguard-network

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    command: ["bun", "run", "dev", "--port", "${DOCKER_VITE_PORT:-5173}"]
    env_file:
      - .env
      - .env.docker
    ports:
      - "${DOCKER_VITE_PORT:-5173}:${DOCKER_VITE_PORT:-5173}"
    networks:
      - webguard-network

  redis:
    image: redis:${DOCKER_REDIS_VERSION:-8.4}-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data
    networks:
      - webguard-network

  mysql:
    image: mysql:${DOCKER_MYSQL_VERSION:-8.4}
    environment:
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DOCKER_MYSQL_DATABASE:-webguard_core}
      MYSQL_USER: ${DOCKER_MYSQL_USER:-webguard}
      MYSQL_PASSWORD: ${DOCKER_MYSQL_PASSWORD:-webguard}
    ports:
      - "${DOCKER_MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webguard-network

volumes:
  config:
    driver: local
  data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local
  webguard_node_modules:
    driver: local

networks:
  webguard-network:
    name: webguard-network
